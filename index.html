<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Cumple de Delfina!</title>
    
    <!-- Meta tags para preview en WhatsApp y Redes Sociales -->
    <meta property="og:title" content="¡El 1er Añito de Delfina! 🎂">
    <meta property="og:description" content="¡Estás invitado! Abrí mi tarjeta interactiva para ver los detalles y confirmar tu asistencia en el País de las Maravillas. ✨">
    <meta property="og:image" itemprop="image" content="https://cumple-delfi-ten.vercel.app/dress.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cumple-delfi-ten.vercel.app/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="magic-particles" id="particles"></div>
    
    <!-- Audio element & Toggle -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <button id="musicToggle" class="music-btn" title="Reproducir música plana">
        <span class="music-icon">🎵</span>
    </button>

    <!-- Floating side decoration OVER the card, but rendered at root to preserve mix-blend-mode -->
    <img src="dress.png" class="side-decoration decor-dress" alt="Vestido de Alicia">

    <div class="invitation-container">
        <div class="glass-card">
            <div class="header">
                <h2>Festejo mi</h2>
                <div class="age">1<span class="anity">añito</span></div>
                <h1 class="name">Delfina</h1>
            </div>
            
            <p class="subtitle">y quiero compartirlo con vos</p>

            <div class="divider">
                <svg width="200" height="20" viewBox="0 0 200 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="10" x2="80" y2="10" stroke="#E5A9AC" stroke-width="2"/>
                    <circle cx="100" cy="10" r="5" fill="#E5A9AC"/>
                    <circle cx="88" cy="10" r="3" fill="#E5A9AC"/>
                    <circle cx="112" cy="10" r="3" fill="#E5A9AC"/>
                    <line x1="120" y1="10" x2="200" y2="10" stroke="#E5A9AC" stroke-width="2"/>
                </svg>
            </div>

            <div class="details">
                <div class="detail-item tooltip-container">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span>09 de Mayo</span>
                    <span class="tooltip">¡Agendalo!</span>
                    <img src="rabbit.png" alt="Conejo" class="hover-character rabbit">
                </div>
                <div class="detail-item">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>De 13:30 hs a 16:00 hs</span>
                    <img src="cat.png" alt="Gato" class="hover-character cat">
                </div>
                <div class="detail-item location">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <div>
                        <strong class="place-name">Salón Casa Soñada</strong>
                        <p class="address">Gdor. Félix Garzón 2054</p>
                    </div>
                    <img src="hatter.png" alt="Sombrerero" class="hover-character hatter">
                </div>
            </div>

            <div class="countdown">
                <p>Faltan:</p>
                <div id="clock" class="clock">
                    <div class="time-box"><span id="days">00</span><p>DÍAS</p></div>
                    <div class="time-box"><span id="hours">00</span><p>HRS</p></div>
                    <div class="time-box"><span id="minutes">00</span><p>MIN</p></div>
                    <div class="time-box"><span id="seconds">00</span><p>SEG</p></div>
                </div>
                
                <div class="action-buttons">
                    <a href="https://maps.app.goo.gl/tu-enlace-aqui" target="_blank" class="map-btn">Ver ubicación</a>
                    <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&dates=20260509T163000Z/20260509T190000Z&text=1er+A%C3%B1ito+de+Delfina&location=Gdor.+F%C3%A9lix+Garz%C3%B3n+2054&details=¡Los+esperamos+para+festejar+magicamente!" target="_blank" class="calendar-btn">📅 Agendar</a>
                </div>
            </div>

            <!-- RSVP Section -->
            <div class="rsvp-section" id="rsvp-section">
                <h3>Confirmar Asistencia</h3>
                <p>¡Por favor, confirmá así te esperamos!</p>
                <form id="rsvp-form" class="rsvp-form">
                    <input type="text" id="guest-name" name="guestName" placeholder="Tu Nombre y Apellido" required>
                    <button type="submit" class="rsvp-btn" id="submit-btn">¡Asistiré!</button>
                </form>
                <div id="rsvp-message" class="message hidden"></div>
            </div>
        </div>
    </div>
    <!-- Cargar SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
